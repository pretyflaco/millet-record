name: mac-sidecar

on:
  push:
    branches: [main]
    paths:
      - "mac/**"
      - ".github/workflows/mac.yml"
  pull_request:
    paths:
      - "mac/**"
      - ".github/workflows/mac.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mac
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          uname -m
          xcodebuild -version
          swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test --parallel

      - name: Locate binary
        id: locate
        run: |
          BIN=$(swift build -c release --show-bin-path)/meet-record-mac
          ls -la "$BIN"
          file "$BIN"
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"

      - name: Smoke test (CLI surface + silent recording)
        # Catches runtime regressions that unit tests can't: WAV header
        # bytes, stop-controller wiring, arg parsing post-build, JSON
        # output validity. Uses --mic none --system none so it doesn't
        # need TCC-granted mic / system-audio permissions (the runner
        # has neither).
        run: |
          BIN="${{ steps.locate.outputs.bin }}"

          echo "=== --version + --help ==="
          "$BIN" --version
          "$BIN" --help > /dev/null
          echo "=== devices --json ==="
          "$BIN" devices --json | tee /tmp/devices.json
          python3 -c "import json,sys; json.load(open('/tmp/devices.json'))"
          echo "=== probe-permissions ==="
          # Exit code likely 1 on a fresh CI runner with no TCC grants;
          # we just confirm it runs without crashing.
          "$BIN" probe-permissions || echo "(exited non-zero — expected on CI runner)"

          echo "=== silent recording (--mic none --system none, 2s) ==="
          # Stdin redirection: /dev/zero gives the binary a never-closing
          # stream of null bytes. The StopController's stdin reader
          # silently ignores anything except 0x71 'q' so /dev/zero is
          # effectively "stdin always open, no q ever sent". Without
          # this, GitHub Actions' default shell stdin is closed at
          # spawn, the reader hits EOF immediately, and stop fires
          # before --max-seconds gets a chance. Production launches via
          # Python use subprocess.PIPE which is a real open pipe.
          #
          # Duration choice: 2.0 s rather than 0.5 s. The Mixer's drain
          # DispatchSourceTimer + the two SyntheticSilence pump timers
          # all schedule at 20 ms intervals, but on the macos-14 runner
          # under load (build still warming caches, parallel jobs, etc.)
          # observed effective tick rate is closer to 100 ms — only ~6
          # paired ticks fired in 0.5 s of wallclock during the first
          # M6b push. This is a known DispatchSource leeway/QoS quirk;
          # not worth tuning the production code for. 2.0 s gives ample
          # headroom even at 10x slower timer cadence.
          "$BIN" record \
              --mic none --system none \
              --max-seconds 2.0 \
              --output /tmp/silent.wav \
              < /dev/zero

          test -f /tmp/silent.wav
          SIZE=$(stat -f%z /tmp/silent.wav)
          echo "silent.wav size = $SIZE bytes"
          # Math at 16 kHz × 2 ch × 2 B = 64000 B/s data:
          #   2.0 s perfect:  44 + 128000 = 128044 bytes
          #   0.5 s observed: 44 + ~6400  = ~6444 bytes (observed M6b push #1)
          # Lower bound: header + at least 0.1 s of audio = 44 + 6400 = 6444.
          # Upper bound: full duration + slack = 128044 + 5% = ~135000.
          # If we land below the lower bound, the recording produced
          # essentially no paired frames, which means the entire
          # SyntheticSilence + Mixer + WavWriter chain is broken.
          [ "$SIZE" -ge 6400 ] && [ "$SIZE" -le 140000 ] \
              || (echo "size out of expected band ($SIZE bytes; expected 6400-140000)" >&2; exit 1)

          echo "=== ffprobe sanity ==="
          ffprobe -v error \
              -show_entries stream=sample_rate,channels,sample_fmt \
              -show_entries format=duration \
              -of default=nw=1 \
              /tmp/silent.wav

      - name: Upload unsigned binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: meet-record-mac-unsigned-${{ github.sha }}
          path: ${{ steps.locate.outputs.bin }}
          if-no-files-found: error
          retention-days: 30
