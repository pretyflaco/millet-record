name: release

# Release pipeline for millet-record (formerly meetscribe-record).
#
# Builds two wheels on every manual run or `record-v*` tag push:
#   * millet_record-<version>-py3-none-any.whl   (Linux/universal,
#     ships an empty millet_record/_bin/ directory; capture.py shells
#     out to system ffmpeg+pactl on Linux)
#   * millet_record-<version>-py3-none-macosx_14_0_arm64.whl
#     (macOS arm64, ships millet_record/_bin/meet-record-mac built by
#     the build-mac-binary job; capture.py uses this binary by default)
#
# On a `record-v*` TAG push (only), the `publish` job uploads BOTH
# wheels + the sdist to PyPI via PyPI Trusted Publishing (OIDC — no
# stored token; the workflow is registered as a trusted publisher on
# the PyPI project). Manual `workflow_dispatch` runs build + verify but
# do NOT publish, so they stay safe for testing.
#
# Publishing the macOS wheel here fixes the gap where 0.4.0–0.4.2 only
# ever shipped the binary-less py3-none-any wheel to PyPI (the macOS
# wheel existed solely as a workflow artifact), so `pip install
# millet-record` on Apple Silicon got no bundled meet-record-mac.
#
# Phase 2 (future): notarize the macOS binary (requires Apple Developer
# ID); the binary currently ships unsigned/ad-hoc.

on:
  push:
    tags:
      - "record-v*"
  workflow_dispatch:
    inputs:
      version_label:
        description: "Version label (informational; metadata pulled from meet_record/__init__.py)"
        required: false
        default: "manual"

jobs:
  # ─── Job 1: build the macOS arm64 binary ──────────────────────────────────
  build-mac-binary:
    runs-on: macos-14
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mac
    outputs:
      sha: ${{ steps.locate.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

      - name: Locate binary + record sha
        id: locate
        run: |
          BIN=$(swift build -c release --show-bin-path)/meet-record-mac
          ls -la "$BIN"
          file "$BIN"
          shasum -a 256 "$BIN"
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"
          echo "sha=$(shasum -a 256 < "$BIN" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload binary as job artifact
        uses: actions/upload-artifact@v4
        with:
          name: meet-record-mac-binary
          path: ${{ steps.locate.outputs.bin }}
          if-no-files-found: error
          retention-days: 7

  # ─── Job 2: build wheels (Linux + macOS arm64) ────────────────────────────
  build-wheels:
    needs: build-mac-binary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: meet-record-mac-binary
          # Must be the CANONICAL package dir millet_record/_bin (setuptools
          # package-data ships millet_record/_bin/*). The legacy meet_record/_bin
          # path is NOT packaged, so the binary silently never made it into the
          # wheel (0.4.0–0.4.2 + the first 0.4.3 attempt shipped an empty _bin/).
          path: millet_record/_bin

      - name: Make binary executable
        run: |
          chmod +x millet_record/_bin/meet-record-mac
          ls -la millet_record/_bin/

      - name: Build base wheel (py3-none-any)
        # `python -m build --wheel` produces a single wheel tagged
        # py3-none-any since the package contains only .py + data
        # files. We then retag a copy as macos-arm64 in the next step.
        run: |
          python -m build --wheel --outdir dist-base
          ls -la dist-base/

      - name: Retag for macOS arm64
        # `wheel tags --platform-tag` rewrites the wheel filename and
        # the WHEEL metadata's Tag: line in place (no --output-dir
        # flag in wheel<=0.46; the retagged wheel is written next to
        # the input). We make two copies of the base wheel in dist/:
        # one stays as py3-none-any (Linux/universal), the other gets
        # retagged via --remove so only the macosx-tagged variant
        # survives in dist/.
        #
        # macosx_14_0_arm64 is the lowest tag pip will match on a 14.x
        # arm64 host; Package.swift enforces 14.4 at runtime.
        run: |
          mkdir -p dist retag-tmp
          BASE_WHEEL=$(ls dist-base/*.whl)
          echo "base wheel: $BASE_WHEEL"

          # Linux/universal wheel: copy as-is.
          cp "$BASE_WHEEL" dist/

          # macOS arm64 wheel: copy to a working dir, retag in place
          # with --remove (drops the py3-none-any variant from
          # retag-tmp), then move the resulting macosx wheel into dist/.
          cp "$BASE_WHEEL" retag-tmp/
          python -m wheel tags \
              --platform-tag macosx_14_0_arm64 \
              --remove \
              retag-tmp/*.whl
          mv retag-tmp/*.whl dist/
          rmdir retag-tmp

          ls -la dist/

      - name: Show wheel contents (sanity)
        run: |
          for w in dist/*.whl; do
              echo "=== $w ==="
              python -m zipfile --list "$w" | head -20
              echo
          done

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 30

  # ─── Job 3: install + smoke the macOS wheel on a fresh runner ────────────
  verify-mac-wheel:
    needs: build-wheels
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: brew install ffmpeg --quiet || brew upgrade ffmpeg --quiet

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Install macOS wheel
        run: |
          MAC_WHEEL=$(ls dist/*macosx_14_0_arm64*.whl)
          echo "installing: $MAC_WHEEL"
          pip install "$MAC_WHEEL"

      - name: Verify install
        run: |
          # `millet --version` proves the entry point + version dynamic
          # plumbing works. Direct sidecar invocation proves the
          # binary made it into _bin/ and is exec-permission-correct.
          # Use the canonical `millet_record` package, not the legacy
          # `meet_record` alias: the alias is installed by a MetaPathFinder
          # inside millet_record/__init__.py, so a bare `import meet_record`
          # in a fresh interpreter (without importing millet_record first)
          # fails — which is what broke the 0.4.3 release verify.
          millet --version || (millet --help 2>&1 | head -1) || true
          python -c "import millet_record; print('millet_record version:', millet_record.__version__)"
          python -c "from millet_record.capture import _resolve_darwin_recorder; print('recorder:', _resolve_darwin_recorder())"

          BIN=$(python -c "from millet_record.capture import _resolve_darwin_recorder; print(_resolve_darwin_recorder())")
          "$BIN" --version
          "$BIN" devices --json | python -m json.tool | head -10

      - name: Quick silent recording from the installed wheel
        # End-to-end: the binary in the wheel actually records a WAV.
        # No TCC permissions needed (--mic none --system none).
        run: |
          BIN=$(python -c "from millet_record.capture import _resolve_darwin_recorder; print(_resolve_darwin_recorder())")
          "$BIN" record \
              --mic none --system none \
              --max-seconds 1.0 \
              --output /tmp/wheel-smoke.wav \
              < /dev/zero
          test -s /tmp/wheel-smoke.wav
          ls -la /tmp/wheel-smoke.wav
          ffprobe -v error -show_entries stream=sample_rate,channels,sample_fmt -of default=nw=1 /tmp/wheel-smoke.wav

  # ─── Job 4: publish both wheels + sdist to PyPI (tag pushes only) ─────────
  publish:
    # Only on a `record-v*` tag push, and only after the macOS wheel has
    # been built AND smoke-verified. Manual workflow_dispatch runs skip
    # this job entirely (build + verify still run, for safe testing).
    if: startsWith(github.ref, 'refs/tags/record-v')
    needs: [build-wheels, verify-mac-wheel]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing (OIDC). No API token stored.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Build sdist
        # The `wheels` artifact carries only the two .whl files; build the
        # source distribution here so PyPI also gets an sdist.
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --outdir dist
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted Publishing resolves credentials via OIDC; no
          # username/password/token inputs. Fails loudly if the project's
          # trusted-publisher config on PyPI doesn't match this workflow.
          packages-dir: dist
          print-hash: true
